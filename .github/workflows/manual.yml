name: Cypress Tests

on: [push]

jobs:
  Cypress-Test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install Faker
        run: npm install @faker-js/faker --save-dev

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
